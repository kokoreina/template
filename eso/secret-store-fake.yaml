# Lab 2.1 - Local fallback provider for testing without AWS.
# The fake provider returns static values and is not for production.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: fake-secrets
  namespace: demo
spec:
  provider:
    fake:
      data:
      - key: /demo/db/password
        value: local-fake-password-v1
        version: v1
      - key: /demo/db/password
        value: local-fake-password-v2
        version: v2
