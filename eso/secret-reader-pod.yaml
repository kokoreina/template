# Lab 2.1 - Reads db-secret from a mounted volume, not env vars.
# Kubelet refreshes mounted Secret content without restarting the Pod.
apiVersion: v1
kind: Pod
metadata:
  name: secret-reader
  namespace: demo
  labels:
    app: secret-reader
spec:
  restartPolicy: Always
  containers:
  - name: reader
    image: busybox:1.36
    command:
    - sh
    - -c
    - |
      while true; do
        echo "$(date -Iseconds) password=$(cat /mnt/db/password 2>/dev/null || true)"
        sleep 10
      done
    volumeMounts:
    - name: db-secret
      mountPath: /mnt/db
      readOnly: true
    resources:
      limits:
        cpu: 50m
        memory: 64Mi
  volumes:
  - name: db-secret
    secret:
      secretName: db-secret
