# Negative test: should be denied by existing Gatekeeper policies.
# Violations: missing resources.limits and explicit runAsUser: 0.
apiVersion: v1
kind: Pod
metadata:
  name: payments-bad-root-no-limits
  namespace: payments
  annotations:
    argocd.argoproj.io/hook: Skip
  labels:
    app: payments-bad-root-no-limits
spec:
  restartPolicy: Never
  securityContext:
    runAsUser: 0
  containers:
  - name: bad
    image: nginx:1.27-alpine
    imagePullPolicy: IfNotPresent
