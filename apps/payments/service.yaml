# Internal service for the payments sample app.
apiVersion: v1
kind: Service
metadata:
  name: payments-web
  namespace: payments
  labels:
    app: payments-web
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: ClusterIP
  selector:
    app: payments-web
  ports:
  - name: http
    port: 80
    targetPort: http
