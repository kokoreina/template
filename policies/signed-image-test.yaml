# Lab 2.2 - Replace the image tag with a Cosign-signed tag from CI.
apiVersion: v1
kind: Pod
metadata:
  name: signed-image-test
  namespace: demo
  labels:
    app: signed-image-test
spec:
  restartPolicy: Never
  containers:
  - name: signed
    image: ghcr.io/kokoreina/w10-api@sha256:c0e7effabd43a8e5662f39b32f34f95854b725ea90137e3a5ba3c49695fe69b6
    imagePullPolicy: IfNotPresent
    ports:
    - containerPort: 8080
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
